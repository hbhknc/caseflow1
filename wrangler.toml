$schema = "./node_modules/wrangler/config-schema.json"

name = "caseflow"
compatibility_date = "2026-03-17"
pages_build_output_dir = "./dist"

[vars]
APP_NAME = "CaseFlow"
CLOUDFLARE_ACCESS_DOMAIN = "https://your-team.cloudflareaccess.com"
CLOUDFLARE_ACCESS_AUD = "replace-with-your-access-application-aud"
CASEFLOW_ACCOUNT_ID = "account_default"
ACCESS_DEV_BYPASS = "false"
ACCESS_DEV_USER_EMAIL = "developer@caseflow.local"
ACCESS_DEV_USER_NAME = "CaseFlow Developer"
ACCESS_DEV_USER_ID = "dev:developer@caseflow.local"

[[d1_databases]]
binding = "DB"
database_name = "caseflow-prod"
database_id = "259331b8-6e54-4cb5-af0b-e62d1eefb72d"
